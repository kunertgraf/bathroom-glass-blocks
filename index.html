<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glass Block Bathroom Visualizer</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="styles.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>

    <aside id="panel">
      <h1>Glass Block Visualizer</h1>
      <p class="hint">Pick a color, then click or drag across blocks to paint. Drag empty space to orbit.</p>

      <section>
        <h2>Palette</h2>
        <div id="swatches" class="swatches"></div>
        <div class="row">
          <input type="color" id="customColor" value="#e8a33d" />
          <button id="addColor">Add to palette</button>
          <button id="resetPalette">Reset</button>
        </div>
        <div class="row">
          <span class="active-label">Active:</span>
          <span id="activeSwatch" class="active-swatch"></span>
          <span id="activeName"></span>
        </div>
      </section>

      <section>
        <h2>Random</h2>
        <div class="row">
          <label># colored blocks <input type="number" id="randCount" min="0" max="80" value="24" /></label>
        </div>
        <button id="randomize">Randomize</button>
      </section>

      <section>
        <h2>Lighting</h2>
        <label class="slider-label">Backlight
          <input type="range" id="backlight" min="0" max="2" step="0.05" value="0.9" />
        </label>
      </section>

      <section>
        <h2>Display</h2>
        <label class="checkbox"><input type="checkbox" id="showContext" checked /> Show bathroom context</label>
        <button id="resetView">Reset view</button>
      </section>

      <section>
        <h2>Arrangements</h2>
        <div class="row">
          <input type="text" id="arrName" placeholder="Arrangement name" />
          <button id="saveArr">Save</button>
        </div>
        <div class="row">
          <select id="savedList"></select>
          <button id="loadArr">Load</button>
          <button id="deleteArr">Delete</button>
        </div>
        <div class="row">
          <button id="shareLink">Copy share link</button>
          <button id="exportPng">Export PNG</button>
        </div>
        <button id="clearAll" class="danger">Clear all blocks</button>
      </section>
    </aside>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
